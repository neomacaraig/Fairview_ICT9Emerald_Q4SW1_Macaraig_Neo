<!DOCTYPE html>
<html>
<head>
<title>Q4 Seatwork 1</title>

<link rel="stylesheet" href="styles.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="login-box">

<h1 class="text-center">Login Page</h1>
<h2 class="text-center">Authentication System</h2>

<p class="text-center">Enter your username and password to continue.</p>

<button class="btn btn-info mb-3" onclick="toggleInstructions()">Show Instructions</button>

<p id="instructions" class="instructions">
Username: <b>must be at least 4 characters</b><br>
Password: <b>must be > or = 6 characters</b>
</p>

<p>Username:</p>
<input type="text" id="username" class="form-control">

<p>Password:</p>
<input type="password" id="password" class="form-control">

<div class="form-check mt-2">
<input class="form-check-input" type="checkbox" onclick="showPass()">
<label class="form-check-label">Show Password</label>
</div>

<br>
<button class="btn btn-primary w-100" onclick="login()">Login</button>

<p id="output"></p>

</div>

<script src="main.js"></script>

</body>
</html>
