<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q4 Seatwork 1</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="login-box">

<h1 class="text-center">Login Page</h1>
<h2 class="text-center">Authentication System</h2>

<p class="text-center">Enter your username and password to continue.</p>

<button class="btn btn-info mb-3" onclick="toggleInstructions()">
Show Instructions
</button>

<p id="instructions" class="instructions">
Username: <b>must be at least 4 characters</b><br>
Use password: <b>password must be > or = 6 characters</b>
</p>

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" id="username" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" id="password" class="form-control">
</div>

<div class="form-check mt-2">
<input class="form-check-input" type="checkbox" onclick="showPass()">
<label class="form-check-label">Show Password</label>
</div>

<button class="btn btn-primary w-100" onclick="login()">Login</button>

<p id="output" class="mt-3 text-center"></p>

<p class="text-center mt-3">
<a href="https://getbootstrap.com" target="_blank">Bootstrap</a>
</p>

</div>

<script src="main.js"></script>

</body>
</html>
